        ]
      }

    function App() {
      // --- APPLICATION STATES ---
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState({
        name: 'Guest Explorer',
        credits: 0,
        subscriptionPlan: 'Free Trial',
        subscriptionExpiry: 'Never'
      });

      const [authName, setAuthName] = useState('');
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [authMode, setAuthMode] = useState('login'); // login | signup | forgot_password
      const [currentView, setCurrentView] = useState('landing'); // landing | auth | dashboard | editor | pricing
      
      const [activeCategory, setActiveCategory] = useState('All');
      const [customTemplates, setCustomTemplates] = useState([]);
      const [loadingCustom, setLoadingCustom] = useState(false);

      // Canvas Viewport States & Canva-like Zoom Layout Setup
      const [canvasWidth] = useState(600);
      const [canvasHeight] = useState(450);
      const [canvasZoom, setCanvasZoom] = useState(1.0); // Multiplier
      const [designTitle, setDesignTitle] = useState('My Masterpiece');
      const [fabricCanvas, setFabricCanvas] = useState(null);
      const [selectedElement, setSelectedElement] = useState(null);
      const [bgColor, setBgColor] = useState('#ffffff');
      const [editorTab, setEditorTab] = useState('templates'); 
      const [currentDesignId, setCurrentDesignId] = useState(null); 
      const [imageUrlInput, setImageUrlInput] = useState('');

      // Export Gates
      const [showExportModal, setShowExportModal] = useState(false);
      const [exportFormat, setExportFormat] = useState('low-png'); // low-png | hd-png | svg
      const [alsoSaveToCloud, setAlsoSaveToCloud] = useState(true);
      const [exportingProgress, setExportingProgress] = useState(false);

      // Gemini AI Generators
      const [aiLayoutPrompt, setAiLayoutPrompt] = useState('');
      const [generatingLayout, setGeneratingLayout] = useState(false);
      const [aiImagePrompt, setAiImagePrompt] = useState('');
      const [generatingImage, setGeneratingImage] = useState(false);

      const [toasts, setToasts] = useState([]);
      const [isScreenBlurred, setIsScreenBlurred] = useState(false);
      const canvasRef = useRef(null);

      const showToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 4000);
      };

      // --- SCREENSHOT GUARD DISRUPTER ENGINE ---
      useEffect(() => {
        const shieldCaptureEvents = (e) => {
          if (e.key === 'PrintScreen' || e.keyCode === 44) {
            e.preventDefault();
            try { navigator.clipboard.writeText(''); } catch (cErr) {}
            showToast("Screenshots block kiye gaye hain template layer data ko surakshit rakhne ke liye!", "error");
          }
          if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 'P' || e.key === 's' || e.key === 'S')) {
            e.preventDefault();
            showToast("Direct download/print block hai. Studio panel export options ka use karein.", "error");
          }
        };

        const blockFocusLost = () => setIsScreenBlurred(true);
        const restoreFocus = () => setIsScreenBlurred(false);

        window.addEventListener('keydown', shieldCaptureEvents);
        window.addEventListener('keyup', shieldCaptureEvents);
        window.addEventListener('blur', blockFocusLost);
        window.addEventListener('focus', restoreFocus);

        return () => {
          window.removeEventListener('keydown', shieldCaptureEvents);
          window.removeEventListener('keyup', shieldCaptureEvents);
          window.removeEventListener('blur', blockFocusLost);
          window.removeEventListener('focus', restoreFocus);
        };
      }, []);

      // --- SECURITY ENFORCEMENT LOOP: LOGIN MANDATORY LOCK ---
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser && !currentUser.isAnonymous) {
            setUser(currentUser);
            if (currentView === 'auth') setCurrentView('dashboard');
          } else {
            setUser(null);
            setUserData({ name: 'Guest Explorer', credits: 0, subscriptionPlan: 'Free Trial', subscriptionExpiry: 'Never' });
            if (currentView === 'dashboard' || currentView === 'editor') {
              showToast("Designing area open karne ke liye please account create ya sign-in karein!", "error");
              setCurrentView('landing');
            }
          }
        });
        return () => unsubscribe();
      }, [currentView]);

      // --- DATABASE CONTINUOUS SYNC ENGINE (REALTIME DATABASE) ---
      useEffect(() => {
        if (!user) {
          setCustomTemplates([]);
          return;
        }

        const profileRef = ref(db, `artifacts/${appId}/users/${user.uid}/profile`);
        const unsubProfile = onValue(profileRef, (snapshot) => {
          const val = snapshot.val();
          if (val) {
            setUserData(val);
          } else {
            const initialProfile = {
              name: user.email.split('@')[0],
              email: user.email,
              credits: 30, // Every user gets 30 Free Startup Credits
              subscriptionPlan: 'Free Trial',
              subscriptionExpiry: 'Never',
              createdAt: Date.now()
            };
            set(profileRef, initialProfile);
            setUserData(initialProfile);
          }
        });

        setLoadingCustom(true);
        const templatesRef = ref(db, `artifacts/${appId}/users/${user.uid}/custom_templates`);
        const unsubTemplates = onValue(templatesRef, (snapshot) => {
          const data = snapshot.val();
          const templates = [];
          if (data) {
            Object.keys(data).forEach((key) => {
              templates.push({ id: key, ...data[key] });
            });
          }
          setCustomTemplates(templates);
          setLoadingCustom(false);
        });

        return () => {
          unsubProfile();
          unsubTemplates();
        };
      }, [user]);

      // --- FABRIC CANVAS SUBSYSTEM LOADING ---
      useEffect(() => {
        if (currentView !== 'editor') {
          if (fabricCanvas) {
            try { fabricCanvas.dispose(); } catch (e) {}
            setFabricCanvas(null);
          }
          return;
        }

        let instance = null;
        const launchCanvas = () => {
          if (!canvasRef.current) return;
          instance = new window.fabric.Canvas(canvasRef.current, {
            width: canvasWidth,
            height: canvasHeight,
            backgroundColor: bgColor
          });

          const syncActiveNode = () => setSelectedElement(instance.getActiveObject() || null);
          instance.on('selection:created', syncActiveNode);
          instance.on('selection:updated', syncActiveNode);
          instance.on('selection:cleared', () => setSelectedElement(null));
          instance.on('object:modified', syncActiveNode);

          instance.renderAll();
          setFabricCanvas(instance);
        };

        if (window.fabric) {
          launchCanvas();
        } else {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js';
          script.async = true;
          script.onload = launchCanvas;
          document.body.appendChild(script);
        }

        return () => {
          if (instance) {
            try { instance.dispose(); } catch (e) {}
          }
        };
      }, [currentView]);

      useEffect(() => {
        if (fabricCanvas) {
          fabricCanvas.setBackgroundColor(bgColor, () => fabricCanvas.renderAll());
        }
      }, [bgColor, fabricCanvas]);

      // --- SECURED ROUTE BLOCK CONTROLLER ---
      const routeActionChecked = (callback) => {
        if (!user) {
          showToast("Designing access blocked! Kripya pehle native Gmail account se login karein.", "error");
          setAuthMode('signup');
          setCurrentView('auth');
          return;
        }
        callback();
      };

      // --- IDENTITY & REGISTRATION MANAGER ---
      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        if (!authEmail || !authPassword) {
          showToast("Kripya sabhi text fields ko fill karein.", "error");
          return;
        }

        if (authMode === 'signup') {
          if (!authEmail.trim().toLowerCase().endsWith('@gmail.com')) {
            showToast("Access Restricted: Gmail accounts ('@gmail.com') are strictly mandatory.", "error");
            return;
          }

          try {
            const credential = await createUserWithEmailAndPassword(auth, authEmail.trim(), authPassword);
            const profileRef = ref(db, `artifacts/${appId}/users/${credential.user.uid}/profile`);
            await set(profileRef, {
              name: authName || authEmail.split('@')[0],
              email: authEmail.trim().toLowerCase(),
              credits: 30, // Store baseline initial balance
              subscriptionPlan: 'Free Trial',
              subscriptionExpiry: 'Never',
              createdAt: Date.now()
            });

            showToast("Signup successful! 30 FREE startup credits successfully added to your database wallet.");
            setCurrentView('dashboard');
          } catch (err) {
            showToast(err.message, "error");
          }
        } else {
          try {
            await signInWithEmailAndPassword(auth, authEmail.trim(), authPassword);
            showToast("Logged in successfully inside dynamic workspace.");
            setCurrentView('dashboard');
          } catch (err) {
            showToast(err.message, "error");
          }
        }
      };

      const handleForgotPasswordReset = async (e) => {
        e.preventDefault();
        if (!authEmail.trim()) {
          showToast("Password link ke liye kripya registered account Gmail enter karein.", "error");
          return;
        }
        try {
          await sendPasswordResetEmail(auth, authEmail.trim());
          showToast("Password reset link aapke native Gmail address par forward kar diya gaya hai!", "success");
          setAuthMode('login');
        } catch (err) {
          showToast(err.message, "error");
        }
      };

      const handleSignOut = async () => {
        try {
          await signOut(auth);
          showToast("Session successfully terminated.");
          setCurrentView('landing');
        } catch (err) {
          showToast(err.message, "error");
        }
      };

      // --- DYNAMIC LAYER MODIFIER SUITE ---
      const updateActiveProperty = (prop, val) => {
        if (!fabricCanvas || !selectedElement) return;
        selectedElement.set(prop, val);
        fabricCanvas.renderAll();
        setSelectedElement(fabricCanvas.getActiveObject());
      };

      const deleteSelectedElement = () => {
        if (!fabricCanvas || !selectedElement) return;
        fabricCanvas.remove(selectedElement);
        fabricCanvas.discardActiveObject();
        fabricCanvas.renderAll();
        setSelectedElement(null);
        showToast("Layer deleted safely.");
      };

      const changeLayerDepth = (direction) => {
        if (!fabricCanvas || !selectedElement) return;
        if (direction === 'forward') selectedElement.bringForward();
        if (direction === 'backward') selectedElement.sendBackwards();
        if (direction === 'front') selectedElement.bringToFront();
        if (direction === 'back') selectedElement.sendToBack();
        fabricCanvas.renderAll();
      };

      const loadDesignToCanvas = (backgroundColor, elements) => {
        if (!fabricCanvas) return;
        fabricCanvas.clear();
        setBgColor(backgroundColor || '#ffffff');
        fabricCanvas.setBackgroundColor(backgroundColor || '#ffffff', () => fabricCanvas.renderAll());

        elements.forEach((el) => {
          const configuration = {
            left: el.left ?? 300, top: el.top ?? 225, fill: el.fill || '#1E293B', angle: el.angle || 0, originX: 'center', originY: 'center'
          };

          let obj;
          if (el.type === 'text' || el.type === 'i-text') {
            obj = new window.fabric.IText(el.text || 'Double Click', {
              ...configuration, fontSize: el.fontSize || 24, fontFamily: el.fontFamily || 'sans-serif', fontWeight: el.fontWeight || 'normal'
            });
          } else if (el.type === 'rect') {
            obj = new window.fabric.Rect({ ...configuration, width: el.width || 100, height: el.height || 100 });
          } else if (el.type === 'circle') {
            obj = new window.fabric.Circle({ ...configuration, radius: el.radius || 50 });
          } else if (el.type === 'triangle') {
            obj = new window.fabric.Triangle({ ...configuration, width: el.width || 100, height: el.height || 100 });
          }

          if (obj) fabricCanvas.add(obj);
        });
        fabricCanvas.renderAll();
      };

      const handleSelectTemplate = (tpl) => {
        routeActionChecked(() => {
          setDesignTitle(tpl.title);
          setCurrentDesignId(null);
          setBgColor(tpl.backgroundColor || '#ffffff');
          setCurrentView('editor');
          setTimeout(() => loadDesignToCanvas(tpl.backgroundColor, tpl.elements), 400);
        });
      };

      const handleStartBlank = () => {
        routeActionChecked(() => {
          setDesignTitle('Untitled Design');
          setCurrentDesignId(null);
          setBgColor('#ffffff');
          setCurrentView('editor');
          setTimeout(() => {
            if (fabricCanvas) {
              fabricCanvas.clear();
              fabricCanvas.setBackgroundColor('#ffffff', () => fabricCanvas.renderAll());
            }
          }, 400);
        });
      };

      const handleSelectCustomTemplate = (saved) => {
        routeActionChecked(() => {
          setDesignTitle(saved.title);
          setCurrentDesignId(saved.id);
          setBgColor(saved.backgroundColor || '#ffffff');
          setCurrentView('editor');
          setTimeout(() => {
            try {
              const list = typeof saved.elements === 'string' ? JSON.parse(saved.elements) : saved.elements;
              loadDesignToCanvas(saved.backgroundColor, list);
              showToast(`Custom workspace loaded: "${saved.title}"`);
            } catch (e) { showToast("Error compiling vector stream template data.", "error"); }
          }, 450);
        });
      };

      const handleSaveToCloud = async (silent = false) => {
        if (!user) return false;
        if (!fabricCanvas) return false;

        try {
          const objects = fabricCanvas.getObjects().map((obj) => {
            const serialized = { type: obj.type, left: obj.left, top: obj.top, angle: obj.angle, fill: obj.fill, scaleX: obj.scaleX, scaleY: obj.scaleY };
            if (obj.type === 'text' || obj.type === 'i-text') {
              serialized.text = obj.text; serialized.fontSize = obj.fontSize; serialized.fontFamily = obj.fontFamily; serialized.fontWeight = obj.fontWeight;
            } else if (obj.type === 'rect' || obj.type === 'triangle') {
              serialized.width = obj.width; serialized.height = obj.height;
            } else if (obj.type === 'circle') {
              serialized.radius = obj.radius;
            }
            return serialized;
          });

          const payload = { title: designTitle, backgroundColor: bgColor, elements: JSON.stringify(objects), updatedAt: Date.now() };

          if (currentDesignId) {
            await set(ref(db, `artifacts/${appId}/users/${user.uid}/custom_templates/${currentDesignId}`), payload);
            if (!silent) showToast("Template progress synced with Database!");
          } else {
            const reference = push(ref(db, `artifacts/${appId}/users/${user.uid}/custom_templates`));
            await set(reference, payload);
            setCurrentDesignId(reference.key);
            if (!silent) showToast("New workspace layout stored inside library data!");
          }
          return true;
        } catch (err) {
          if (!silent) showToast("Database persistence operation drops.", "error");
          return false;
        }
      };

      const handleDeleteCustomTemplate = async (id, e) => {
        e.stopPropagation();
        if (!user) return;
        try {
          await remove(ref(db, `artifacts/${appId}/users/${user.uid}/custom_templates/${id}`));
          showToast("Design erased from profile records.");
        } catch (err) { showToast("Delete loop failed.", "error"); }
      };

      const handleOpenExportModal = () => {
        routeActionChecked(() => setShowExportModal(true));
      };

      const handleCustomImageUpload = (e) => {
        if (!fabricCanvas) return;
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
          window.fabric.Image.fromURL(event.target.result, (img) => {
            img.set({
              left: canvasWidth / 2,
              top: canvasHeight / 2,
              originX: 'center',
              originY: 'center'
            });
            img.scaleToWidth(180);
            fabricCanvas.add(img);
            fabricCanvas.setActiveObject(img);
            fabricCanvas.renderAll();
          });
        };
        reader.readAsDataURL(file);
        showToast("Image loaded onto design canvas.");
      };

      const addTextToCanvas = (textStr = 'Double click to edit', options = {}) => {
        if (!fabricCanvas) return;
        const text = new window.fabric.IText(textStr, {
          left: canvasWidth / 2,
          top: canvasHeight / 2,
          fontSize: 26,
          fontFamily: 'sans-serif',
          fill: '#1E293B',
          originX: 'center',
          originY: 'center',
          ...options
        });
        fabricCanvas.add(text);
        fabricCanvas.setActiveObject(text);
        fabricCanvas.renderAll();
      };

      const addShapeToCanvas = (shapeType) => {
        if (!fabricCanvas) return;
        const configuration = {
          left: canvasWidth / 2,
          top: canvasHeight / 2,
          fill: '#4F46E5',
          originX: 'center',
          originY: 'center',
        };

        let shapeObj;
        if (shapeType === 'rect') {
          shapeObj = new window.fabric.Rect({ ...configuration, width: 120, height: 120 });
        } else if (shapeType === 'circle') {
