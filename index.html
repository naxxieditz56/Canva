<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nestless - Canva for Beginners</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

  <style>
    @keyframes slideIn {
      from { transform: translateY(1rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-in {
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body>

  <div id="nestless-app-root"></div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { 
      getAuth, 
      signInWithCustomToken, 
      signInAnonymously, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged 
    } from 'firebase/auth';
    import { 
      getDatabase, 
      ref, 
      set, 
      push, 
      onValue, 
      remove 
    } from 'firebase/database';

    // Expose references onto window objects to bridge modular module loading with Babel scripts
    window.FirebaseAuthModules = {
      initializeApp, getAuth, signInWithCustomToken, signInAnonymously,
      createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged,
      getDatabase, ref, set, push, onValue, remove
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyBkqCtgo6aEW_vt2bbor86Gh9z0bDhPg1Q",
      authDomain: "earn-qearner.firebaseapp.com",
      databaseURL: "https://earn-qearner-default-rtdb.firebaseio.com",
      projectId: "earn-qearner",
      storageBucket: "earn-qearner.firebasestorage.app",
      messagingSenderId: "952564046626",
      appId: "1:952564046626:web:e43d4e85cd62a66a54a37b",
      measurementId: "G-7WX77SLQP1"
    };

    // Safe extraction of imported context references
    const { 
      initializeApp, getAuth, signInWithCustomToken, signInAnonymously,
      createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged,
      getDatabase, ref, set, push, onValue, remove 
    } = window.FirebaseAuthModules;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const rawAppId = typeof __app_id !== 'undefined' ? __app_id : 'nestless-default';
    const appId = rawAppId.replace(/[.\/#$\[\]]/g, '_');

    const SAMPLE_TEMPLATES = [
      {
        id: 't-insta-fashion',
        title: 'Instagram Fashion Sale',
        category: 'Social Media',
        thumbnail: '🛍️',
        backgroundColor: '#FFF1F2',
        elements: [
          { type: 'rect', left: 300, top: 225, width: 520, height: 380, fill: '#FFE4E6', angle: 0 },
          { type: 'text', text: 'SUMMER FASHION', left: 300, top: 120, fontSize: 38, fontWeight: 'bold', fill: '#E11D48', fontFamily: 'Impact' },
          { type: 'text', text: 'UP TO 60% OFF ALL ITEMS', left: 300, top: 200, fontSize: 22, fill: '#4B5563', fontFamily: 'Arial' },
          { type: 'circle', left: 300, top: 310, radius: 45, fill: '#FB7185' },
          { type: 'text', text: 'SHOP NOW', left: 300, top: 310, fontSize: 16, fontWeight: 'bold', fill: '#FFFFFF', fontFamily: 'Arial' }
        ]
      },
      {
        id: 't-tech-poster',
        title: 'Minimalist Tech Meetup',
        category: 'Posters',
        thumbnail: '💻',
        backgroundColor: '#FAF5FF',
        elements: [
          { type: 'circle', left: 300, top: 200, radius: 130, fill: '#F3E8FF' },
          { type: 'text', text: 'NESTLESS DEVCON 2026', left: 300, top: 90, fontSize: 26, fontWeight: 'bold', fill: '#6B21A8', fontFamily: 'Georgia' },
          { type: 'text', text: 'Building the Future with AI & Design', left: 300, top: 160, fontSize: 16, fill: '#7C3AED', fontFamily: 'Arial' },
          { type: 'rect', left: 300, top: 280, width: 180, height: 40, fill: '#8B5CF6' },
          { type: 'text', text: 'Join Live Now', left: 300, top: 280, fontSize: 14, fontWeight: 'bold', fill: '#FFFFFF', fontFamily: 'Arial' }
        ]
      },
      {
        id: 't-startup-logo',
        title: 'Apex Tech Emblem',
        category: 'Logos',
        thumbnail: '⚡',
        backgroundColor: '#0F172A',
        elements: [
          { type: 'rect', left: 300, top: 160, width: 80, height: 80, angle: 45, fill: '#38BDF8' },
          { type: 'rect', left: 300, top: 160, width: 55, height: 55, angle: 45, fill: '#0F172A' },
          { type: 'text', text: 'APEX', left: 300, top: 260, fontSize: 32, fontWeight: 'bold', fill: '#FFFFFF', fontFamily: 'Courier New' },
          { type: 'text', text: 'Next-Gen Hosting', left: 300, top: 300, fontSize: 12, fill: '#38BDF8', fontFamily: 'Arial' }
        ]
      },
      {
        id: 't-yt-thumbnail',
        title: 'Gaming Masterclass',
        category: 'Thumbnails',
        thumbnail: '🎮',
        backgroundColor: '#030712',
        elements: [
          { type: 'rect', left: 160, top: 225, width: 300, height: 450, fill: '#1F2937', angle: -10 },
          { type: 'text', text: 'BECOME A PRO', left: 300, top: 110, fontSize: 44, fontWeight: 'bold', fill: '#FACC15', fontFamily: 'Impact' },
          { type: 'text', text: '10 Advanced Tips & Tricks', left: 300, top: 190, fontSize: 20, fill: '#38BDF8', fontFamily: 'Arial' },
          { type: 'circle', left: 450, top: 300, radius: 55, fill: '#EF4444' },
          { type: 'text', text: 'FREE', left: 450, top: 300, fontSize: 22, fontWeight: 'bold', fill: '#FFFFFF', fontFamily: 'Arial' }
        ]
      }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [authMode, setAuthMode] = useState('login'); 
      const [currentView, setCurrentView] = useState('landing'); 
      
      const [activeCategory, setActiveCategory] = useState('All');
      const [customTemplates, setCustomTemplates] = useState([]);
      const [loadingCustom, setLoadingCustom] = useState(false);

      const [canvasWidth, setCanvasWidth] = useState(600);
      const [canvasHeight, setCanvasHeight] = useState(450);
      const [designTitle, setDesignTitle] = useState('My Masterpiece');
      const [fabricCanvas, setFabricCanvas] = useState(null);
      const [selectedElement, setSelectedElement] = useState(null);
      const [bgColor, setBgColor] = useState('#ffffff');
      const [editorTab, setEditorTab] = useState('templates'); 
      const [currentDesignId, setCurrentDesignId] = useState(null); 
      const [imageUrlInput, setImageUrlInput] = useState('');

      const [showExportModal, setShowExportModal] = useState(false);
      const [exportFormat, setExportFormat] = useState('png'); 
      const [alsoSaveToCloud, setAlsoSaveToCloud] = useState(true);
      const [exportingProgress, setExportingProgress] = useState(false);

      const [aiLayoutPrompt, setAiLayoutPrompt] = useState('');
      const [generatingLayout, setGeneratingLayout] = useState(false);
      const [aiImagePrompt, setAiImagePrompt] = useState('');
      const [generatingImage, setGeneratingImage] = useState(false);

      const [toasts, setToasts] = useState([]);
      const canvasRef = useRef(null);

      const showToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts((prev) => prev.filter((t) => t.id !== id));
        }, 4500);
      };

      useEffect(() => {
        const handleAuthFallback = (err) => {
          console.warn("Firebase Anonymous Sign-In is restricted or disabled in Firebase Console. Switching safely to Local Guest Mode:", err);
          setUser({
            uid: 'guest-local',
            isAnonymous: true,
            email: 'Guest Explorer'
          });
        };

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              try {
                await signInWithCustomToken(auth, __initial_auth_token);
              } catch (tokenErr) {
                console.warn("Custom token match issue, immediately choosing anonymous sign-in fallback:", tokenErr);
                try {
                  await signInAnonymously(auth);
                } catch (anonErr) {
                  handleAuthFallback(anonErr);
                }
              }
            } else {
              try {
                await signInAnonymously(auth);
              } catch (anonErr) {
                handleAuthFallback(anonErr);
              }
            }
          } catch (err) {
            console.error("Auth pre-initialization error:", err);
            handleAuthFallback(err);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            if (currentView === 'auth') {
              setCurrentView('dashboard');
            }
          }
        });

        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) {
          setCustomTemplates([]);
          return;
        }

        if (user.uid === 'guest-local') {
          const localSavedStr = localStorage.getItem(`nestless_local_templates_${appId}`);
          if (localSavedStr) {
            try {
              setCustomTemplates(JSON.parse(localSavedStr));
            } catch (e) {
              console.error("Failed to parse locally stored custom templates:", e);
              setCustomTemplates([]);
            }
          } else {
            setCustomTemplates([]);
          }
          setLoadingCustom(false);
          return;
        }

        setLoadingCustom(true);
        const templatesRef = ref(db, `artifacts/${appId}/users/${user.uid}/custom_templates`);
        
        const unsubscribe = onValue(templatesRef, (snapshot) => {
          const data = snapshot.val();
          const templates = [];
          if (data) {
            Object.keys(data).forEach((key) => {
              templates.push({ id: key, ...data[key] });
            });
          }
          setCustomTemplates(templates);
          setLoadingCustom(false);
          }, (error) => {
          console.error("Firebase RTDB Listening Error:", error);
          setLoadingCustom(false);
        });

        return () => unsubscribe();
      }, [user]);

      useEffect(() => {
        if (currentView !== 'editor') {
          if (fabricCanvas) {
            fabricCanvas.dispose();
            setFabricCanvas(null);
          }
          return;
        }

        let canvasInstance = null;

        const setupCanvas = () => {
          if (!canvasRef.current) return;
          canvasInstance = new window.fabric.Canvas(canvasRef.current, {
            width: canvasWidth,
            height: canvasHeight,
            backgroundColor: bgColor
          });

          const handleSelection = () => {
            const active = canvasInstance.getActiveObject();
            setSelectedElement(active || null);
          };

          canvasInstance.on('selection:created', handleSelection);
          canvasInstance.on('selection:updated', handleSelection);
          canvasInstance.on('selection:cleared', () => setSelectedElement(null));
          canvasInstance.on('object:modified', handleSelection);

          canvasInstance.renderAll();
          setFabricCanvas(canvasInstance);
        };

        if (window.fabric) {
          setupCanvas();
        } else {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js';
          script.async = true;
          script.onload = () => setupCanvas();
          document.body.appendChild(script);
        }

        return () => {
          if (canvasInstance) {
            canvasInstance.dispose();
          }
        };
      }, [currentView]);

      useEffect(() => {
        if (fabricCanvas) {
          fabricCanvas.setBackgroundColor(bgColor, () => {
            fabricCanvas.renderAll();
          });
        }
      }, [bgColor, fabricCanvas]);

      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        if (!authEmail || !authPassword) {
          showToast("Please provide both email and password.", "error");
          return;
        }
        try {
          if (authMode === 'signup') {
            await createUserWithEmailAndPassword(auth, authEmail, authPassword);
            showToast("Welcome to Nestless! Account created successfully.");
          } else {
            await signInWithEmailAndPassword(auth, authEmail, authPassword);
            showToast("Welcome back to Nestless!");
          }
          setCurrentView('dashboard');
        } catch (err) {
          showToast(err.message, "error");
        }
      };

      const handleSignOut = async () => {
        try {
          await signOut(auth);
          await signInAnonymously(auth);
          showToast("Signed out successfully. Switched to workspace explore mode.");
          setCurrentView('landing');
        } catch (err) {
          showToast(err.message, "error");
        }
      };

      const addTextToCanvas = (textStr = 'Double click to edit', options = {}) => {
        if (!fabricCanvas) return;
        const text = new window.fabric.IText(textStr, {
          left: canvasWidth / 2,
          top: canvasHeight / 2,
          fontSize: 26,
          fontFamily: 'sans-serif',
          fill: '#1E293B',
          originX: 'center',
          originY: 'center',
          ...options
        });
        fabricCanvas.add(text);
        fabricCanvas.setActiveObject(text);
        fabricCanvas.renderAll();
      };

      const addShapeToCanvas = (shapeType) => {
        if (!fabricCanvas) return;
        const common = {
          left: canvasWidth / 2,
          top: canvasHeight / 2,
          fill: '#4F46E5',
          originX: 'center',
          originY: 'center',
        };

        let shapeObj;
        if (shapeType === 'rect') {
          shapeObj = new window.fabric.Rect({
            ...common,
            width: 120,
            height: 120
          });
        } else if (shapeType === 'circle') {
          shapeObj = new window.fabric.Circle({
            ...common,
            radius: 60
          });
        } else if (shapeType === 'triangle') {
          shapeObj = new window.fabric.Triangle({
            ...common,
            width: 120,
            height: 110
          });
        }

        if (shapeObj) {
          fabricCanvas.add(shapeObj);
          fabricCanvas.setActiveObject(shapeObj);
          fabricCanvas.renderAll();
        }
      };

      const handleCustomImageUpload = (e) => {
        if (!fabricCanvas) return;
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
          window.fabric.Image.fromURL(event.target.result, (img) => {
            img.set({
              left: canvasWidth / 2,
              top: canvasHeight / 2,
              originX: 'center',
              originY: 'center'
            });
            img.scaleToWidth(180);
            fabricCanvas.add(img);
            fabricCanvas.setActiveObject(img);
            fabricCanvas.renderAll();
          });
        };
        reader.readAsDataURL(file);
        showToast("Image loaded onto design canvas.");
      };

      const addImageFromUrl = (url) => {
        if (!fabricCanvas || !url) return;
        window.fabric.Image.fromURL(url, (img) => {
          img.set({
            left: canvasWidth / 2,
            top: canvasHeight / 2,
            originX: 'center',
            originY: 'center'
          });
          img.scaleToWidth(180);
          fabricCanvas.add(img);
          fabricCanvas.setActiveObject(img);
          fabricCanvas.renderAll();
        }, {
          crossOrigin: 'anonymous'
        });
        showToast("External graphic placed.");
      };

      const updateActiveProperty = (prop, val) => {
        if (!fabricCanvas || !selectedElement) return;
        selectedElement.set(prop, val);
        fabricCanvas.renderAll();
        setSelectedElement(fabricCanvas.getActiveObject());
      };

      const deleteSelectedElement = () => {
        if (!fabricCanvas || !selectedElement) return;
        fabricCanvas.remove(selectedElement);
        fabricCanvas.discardActiveObject();
        fabricCanvas.renderAll();
        setSelectedElement(null);
        showToast("Layer deleted.");
      };

      const changeLayerDepth = (direction) => {
        if (!fabricCanvas || !selectedElement) return;
        if (direction === 'forward') {
          selectedElement.bringForward();
        } else if (direction === 'backward') {
          selectedElement.sendBackwards();
        } else if (direction === 'front') {
          selectedElement.bringToFront();
        } else if (direction === 'back') {
          selectedElement.sendToBack();
        }
        fabricCanvas.renderAll();
      };

      const loadDesignToCanvas = (backgroundColor, elements) => {
        if (!fabricCanvas) return;
        fabricCanvas.clear();
        setBgColor(backgroundColor || '#ffffff');
        fabricCanvas.setBackgroundColor(backgroundColor || '#ffffff', () => {
          fabricCanvas.renderAll();
        });

        elements.forEach((el) => {
          const commonProps = {
            left: el.left ?? 300,
            top: el.top ?? 225,
            fill: el.fill || '#1E293B',
            angle: el.angle || 0,
            originX: 'center',
            originY: 'center'
          };

          let obj;
          if (el.type === 'text' || el.type === 'i-text') {
            obj = new window.fabric.IText(el.text || 'Double Click', {
              ...commonProps,
              fontSize: el.fontSize || 24,
              fontFamily: el.fontFamily || 'sans-serif',
              fontWeight: el.fontWeight || 'normal'
            });
          } else if (el.type === 'rect') {
            obj = new window.fabric.Rect({
              ...commonProps,
              width: el.width || 100,
              height: el.height || 100
            });
          } else if (el.type === 'circle') {
            obj = new window.fabric.Circle({
              ...commonProps,
              radius: el.radius || 50
            });
          } else if (el.type === 'triangle') {
            obj = new window.fabric.Triangle({
              ...commonProps,
              width: el.width || 100,
              height: el.height || 100
            });
          } else if (el.type === 'image') {
            window.fabric.Image.fromURL(el.src || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150', (img) => {
              img.set({
                ...commonProps,
                scaleX: el.scaleX || 1,
                scaleY: el.scaleY || 1
              });
              fabricCanvas.add(img);
              fabricCanvas.renderAll();
            }, { crossOrigin: 'anonymous' });
            return;
          }

          if (obj) {
            fabricCanvas.add(obj);
          }
        });

        fabricCanvas.renderAll();
      };

      const handleSelectTemplate = (tpl) => {
        setDesignTitle(tpl.title);
        setCurrentDesignId(null);
        setBgColor(tpl.backgroundColor || '#ffffff');
        setCurrentView('editor');

        setTimeout(() => {
          loadDesignToCanvas(tpl.backgroundColor, tpl.elements);
          showToast(`Loaded "${tpl.title}" template.`);
        }, 400);
      };

      const handleStartBlank = () => {
        setDesignTitle('Untitled Design');
        setCurrentDesignId(null);
        setBgColor('#ffffff');
        setCurrentView('editor');
        setTimeout(() => {
          if (fabricCanvas) {
            fabricCanvas.clear();
            setBgColor('#ffffff');
            fabricCanvas.setBackgroundColor('#ffffff', () => fabricCanvas.renderAll());
          }
        }, 400);
      };

      const handleSelectCustomTemplate = (saved) => {
        setDesignTitle(saved.title);
        setCurrentDesignId(saved.id);
        setBgColor(saved.backgroundColor || '#ffffff');
        setCurrentView('editor');

        setTimeout(() => {
          try {
            const parsedElements = typeof saved.elements === 'string' 
              ? JSON.parse(saved.elements) 
              : saved.elements;
            loadDesignToCanvas(saved.backgroundColor, parsedElements);
            showToast(`Loaded custom workspace: "${saved.title}".`);
          } catch (err) {
            console.error("Failed to parse stored elements:", err);
            showToast("Error parsing layout elements.", "error");
          }
        }, 450);
      };

      const handleSaveToCloud = async (silent = false) => {
        if (!user) {
          if (!silent) showToast("Sign in with email/password to save designs permanently.", "error");
          return false;
        }
        if (!fabricCanvas) return false;

        try {
          const objects = fabricCanvas.getObjects();
          const elementsArray = objects.map((obj) => {
            const type = obj.type;
            const serialized = {
              type,
              left: obj.left,
              top: obj.top,
              angle: obj.angle,
              fill: obj.fill,
              scaleX: obj.scaleX,
              scaleY: obj.scaleY
            };

            if (type === 'text' || type === 'i-text') {
              serialized.text = obj.text;
              serialized.fontSize = obj.fontSize;
              serialized.fontFamily = obj.fontFamily;
              serialized.fontWeight = obj.fontWeight;
            } else if (type === 'rect') {
              serialized.width = obj.width;
              serialized.height = obj.height;
            } else if (type === 'circle') {
              serialized.radius = obj.radius;
            } else if (type === 'triangle') {
              serialized.width = obj.width;
              serialized.height = obj.height;
            } else if (type === 'image') {
              serialized.src = obj._element?.src || '';
            }

            return serialized;
          });

          const payload = {
            title: designTitle || 'Untitled Design',
            backgroundColor: bgColor,
            elements: JSON.stringify(elementsArray),
            updatedAt: Date.now()
          };

          if (user.uid === 'guest-local') {
            const localSavedStr = localStorage.getItem(`nestless_local_templates_${appId}`);
            let localSaved = localSavedStr ? JSON.parse(localSavedStr) : [];
            
            if (currentDesignId && currentDesignId.toString().startsWith('local-')) {
              localSaved = localSaved.map(item => item.id === currentDesignId ? { ...payload, id: currentDesignId } : item);
              if (!silent) showToast("Design updated successfully in Local Storage!");
            } else {
              const newId = `local-${Date.now()}`;
              localSaved.push({ ...payload, id: newId });
              setCurrentDesignId(newId);
              if (!silent) showToast("Saved to Local Storage. Sign in to back up on Cloud! ✨");
            }
            localStorage.setItem(`nestless_local_templates_${appId}`, JSON.stringify(localSaved));
            setCustomTemplates(localSaved);
            return true;
          }

          if (currentDesignId) {
            const templateRef = ref(db, `artifacts/${appId}/users/${user.uid}/custom_templates/${currentDesignId}`);
            await set(templateRef, payload);
            if (!silent) showToast("Design updated successfully in RTDB cloud!");
          } else {
            const templatesRef = ref(db, `artifacts/${appId}/users/${user.uid}/custom_templates`);
            const newTemplateRef = push(templatesRef);
            await set(newTemplateRef, payload);
            setCurrentDesignId(newTemplateRef.key);
            if (!silent) showToast("Design saved as new custom template in RTDB!");
          }
          return true;
        } catch (err) {
          console.error(err);
          if (!silent) showToast("Error syncing with Firebase Realtime Database.", "error");
          return false;
        }
      };

      const handleDeleteCustomTemplate = async (id, e) => {
        e.stopPropagation();
        if (!user) return;

        if (user.uid === 'guest-local') {
          try {
            const localSavedStr = localStorage.getItem(`nestless_local_templates_${appId}`);
            if (localSavedStr) {
              let localSaved = JSON.parse(localSavedStr);
              localSaved = localSaved.filter(item => item.id !== id);
              localStorage.setItem(`nestless_local_templates_${appId}`, JSON.stringify(localSaved));
              setCustomTemplates(localSaved);
              showToast("Deleted local template.");
            }
          } catch (err) {
            showToast("Failed to delete local template.", "error");
          }
          return;
        }

        try {
          const templateRef = ref(db, `artifacts/${appId}/users/${user.uid}/custom_templates/${id}`);
          await remove(templateRef);
          showToast("Deleted saved template.");
        } catch (err) {
          showToast("Failed to delete design.", "error");
        }
      };

      const handleDownloadPNG = () => {
        if (!fabricCanvas) return;
        const active = fabricCanvas.getActiveObject();
        if (active) {
          fabricCanvas.discardActiveObject();
          fabricCanvas.renderAll();
        }

        const dataURL = fabricCanvas.toDataURL({
          format: 'png',
          quality: 1.0
        });

        const link = document.createElement('a');

        const svgContent = fabricCanvas.toSVG();
        const blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });

        const link = document.createElement('a');
        link.download = `${designTitle.toLowerCase().replace(/\s+/g, '-') || 'design'}.svg`;
        link.href = url;
        link.click();

        URL.revokeObjectURL(url);

        setGeneratingLayout(true);
        const apiKey = ""; 

        const systemPrompt = `You are a professional graphic designer expert. Create a custom template JSON based on the user request.
The JSON must be compatible with a canvas of size 600x450. Coordinates 'left' must be within 50 to 550 and 'top' within 50 to 400.
Always position elements centered relative to their origin.
Output MUST strictly match this JSON schema:
{
  "backgroundColor": "string (hex color)",
  "elements": [
    {
      "type": "text" | "rect" | "circle" | "triangle",
      "text": "string (only for text types)",
      "left": number,
      "top": number,
      "width": number (for rect, triangle),
      "height": number (for rect, triangle),
      "radius": number (for circle),
      "fill": "string (color hex code)",
      "fontSize": number (14 to 48, for text types),
      "fontFamily": "string (Arial, Georgia, Impact, Courier New)",
      "fontWeight": "string (normal or bold)"
    }
  ]
}
Provide a high-quality palette and clean, beautiful modern alignment. Respond ONLY with valid JSON string. Do not include markdown code block characters like \`\`\`json.`;

        let attempts = 0;
        let delay = 1000;
        let success = false;
        let rawText = "";

        while (attempts < 5 && !success) {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                contents: [{
                  parts: [{
                    text: `${systemPrompt}\n\nUser Design Request: "${aiLayoutPrompt}"`
                  }]
                }]
              })
            });

            if (!response.ok) {
              throw new Error(`API returned HTTP ${response.status}`);
            }

            const data = await response.json();
            rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (rawText) {
              success = true;
            } else {
              throw new Error("Empty candidate payload returned from Gemini.");
            }
          } catch (err) {
            attempts++;
            if (attempts >= 5) {
              setGeneratingLayout(false);
              showToast("Gemini API connection timed out. Please check your internet connection.", "error");
              return;
            }
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2; 
          }
        }

        try {
          let cleanText = rawText.trim();
          if (cleanText.startsWith('```json')) {
            cleanText = cleanText.substring(7);
          }
          if (cleanText.startsWith('```')) {
            cleanText = cleanText.substring(3);
          }
          if (cleanText.endsWith('```')) {
            cleanText = cleanText.substring(0, cleanText.length - 3);
          }
          
          const parsed = JSON.parse(cleanText.trim());
          
          if (parsed && parsed.elements) {
            loadDesignToCanvas(parsed.backgroundColor, parsed.elements);
            showToast("Gemini parsed your prompt and generated a layout successfully!");
            setAiLayoutPrompt('');
          } else {
            throw new Error("Invalid design structure schema.");
          }
        } catch (parseErr) {
          console.error("Gemini Response parsing error. Raw output: ", rawText, parseErr);
          showToast("Gemini structured layout parse issue. Re-try or clarify the prompt.", "error");
        } finally {
          setGeneratingLayout(false);
        }
      };

          showToast("Describe the graphic you need generated.", "error");
          return;

        setGeneratingImage(true);
        const apiKey = ""; 

        let attempts = 0;
        let delay = 1000;
        let success = false;
        let imgBase64 = "";

        while (attempts < 5 && !success) {

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {

                'Content-Type': 'application/json'

                parameters: { sampleCount: 1 }
              })
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const result = await response.json();
            imgBase64 = result.predictions?.[0]?.bytesBase64Encoded;
            if (imgBase64) {
              success = true;
            } else {
              throw new Error("Empty base64 prediction.");
            }
          } catch (err) {
            attempts++;

            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2;

                              onClick={() => updateActiveProperty('fontWeight', selectedElement.fontWeight === 'bold' ? 'normal' : 'bold')}
                              className={`flex-1 py-1 px-3 rounded text-xs font-semibold border ${
                                selectedElement.fontWeight === 'bold' ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-800 border-slate-700 text-slate-300'
                              }`}
                            >
                              Bold
                            </button>
                          </div>
                        </div>
                      </div>
                    )}

                    <div className="pt-4 border-t border-slate-800">
                      <span className="text-[10px] text-slate-400 font-bold block mb-2">Layer Management</span>
                      <div className="grid grid-cols-2 gap-2">
                        <button
                          onClick={() => changeLayerDepth('forward')}
                          className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs py-1.5 rounded-lg transition"
                          title="Bring Up One Step"
                        >
                          Up ↑
                        </button>
                        <button
                          onClick={() => changeLayerDepth('backward')}
                          className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs py-1.5 rounded-lg transition"
                          title="Send Down One Step"
                        >
                          Down ↓
                        </button>
                        <button
                          onClick={() => changeLayerDepth('front')}
                          className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs py-1.5 rounded-lg transition font-semibold"
                          title="Bring to absolute front"
                        >
                          To Front
                        </button>
                        <button
                          onClick={() => changeLayerDepth('back')}
                          className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs py-1.5 rounded-lg transition font-semibold"
                          title="Send to absolute back"
                        >
                          To Back
                        </button>
                      </div>
                    </div>

                    <div className="pt-4 border-t border-slate-800">
                      <button
                        onClick={deleteSelectedElement}
                        className="w-full bg-rose-950/40 hover:bg-rose-950 border border-rose-900/40 text-rose-300 font-semibold py-2.5 rounded-xl text-xs transition flex items-center justify-center gap-2"
                      >
                        <span>🗑️</span>
                        <span>Delete Layer</span>
                      </button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-6">
                    <div className="bg-slate-800/40 border border-slate-800 p-4 rounded-xl text-center">
                      <span className="text-xl block mb-1">🖱️</span>
                      <p className="text-xs text-slate-400 font-medium">Select any element on the canvas to inspect & change its color, font family, sizes, and layering depth.</p>
                    </div>

                    <div className="pt-4 border-t border-slate-800">
                      <span className="text-[10px] text-slate-400 font-bold block mb-1.5">Canvas Base Color</span>
                      <div className="flex items-center gap-3">
                        <input
                          type="color"
                          value={bgColor}
                          onChange={(e) => setBgColor(e.target.value)}
                          className="w-10 h-10 rounded border border-slate-700 bg-transparent cursor-pointer"
                        />
                        <input
                          type="text"
                          value={bgColor}
                          onChange={(e) => setBgColor(e.target.value)}
                          className="bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-lg text-xs text-slate-300 w-24 focus:ring-1 focus:ring-indigo-500 outline-none"
                        />
                      </div>
                    </div>
                  </div>
                )}
              </aside>
            </div>
          )}
        </div>
      );
    }

    const appMountRoot = ReactDOM.createRoot(document.getElementById('nestless-app-root'));
    appMountRoot.render(<App />);
  </script>
</body>
</html>
