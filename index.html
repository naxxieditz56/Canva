<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mega Studio + AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700;800;900&family=Archivo+Black&family=Anton&family=Playfair+Display:wght@400;700;900&family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050505;--panel:#0A0A0A;--panel2:#111111;--border:#1e293b;
  --text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--green:#10b981;
  --red:#ef4444;--purple:#a855f7;--indigo:#6366f1;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;color:inherit;background:#000;border:1px solid var(--border);border-radius:5px;outline:none;color:var(--text)}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:#1e293b}
label{font-size:9px;color:var(--muted);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh}

/* Header */
header{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:20}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon i{font-size:12px;color:#fff}
.logo-name{font-size:12px;font-weight:800;letter-spacing:2px;color:#fff}
.header-right{display:flex;align-items:center;gap:12px}
.zoom-ctrl{display:flex;align-items:center;gap:4px;background:#111;border:1px solid var(--border);border-radius:7px;padding:3px}
.zoom-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--muted);font-size:9px;transition:.15s}
.zoom-btn:hover{background:#334155;color:#fff}
.zoom-val{font-size:10px;font-weight:700;width:36px;text-align:center}
.btn-export{background:#fff;color:#000;padding:5px 14px;border-radius:8px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;box-shadow:0 0 14px rgba(255,255,255,.15);transition:.15s}
.btn-export:hover{background:#e2e8f0}

/* Workspace */
.workspace{display:flex;flex:1;overflow:hidden}

/* Left Sidebar */
aside{width:320px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
aside::-webkit-scrollbar{width:4px}
aside::-webkit-scrollbar-track{background:#0a0a0a}
aside::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
aside::-webkit-scrollbar-thumb:hover{background:#475569}

.section{padding:14px;border-bottom:1px solid var(--border)}
.sec-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.sec-title.ai{color:#818cf8}

/* Format Grid */
.fmt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fmt-btn{padding:8px;border-radius:8px;border:1px solid var(--border);background:#111;text-align:left;transition:.15s;display:flex;flex-direction:column;gap:3px}
.fmt-btn.active{border-color:var(--accent);background:rgba(59,130,246,.08)}
.fmt-btn:hover:not(.active){border-color:#334155}
.fmt-btn .fmt-name{font-size:10px;font-weight:700;color:#cbd5e1;display:flex;align-items:center;gap:5px}
.fmt-btn .fmt-dim{font-size:9px;color:var(--muted)}
.fmt-btn.active .fmt-name i{color:var(--accent)}
.custom-dims{display:flex;gap:8px;margin-top:10px;padding:10px;background:#111;border:1px solid var(--border);border-radius:8px}
.custom-dims .field{flex:1}
.custom-dims input{width:100%;padding:4px 8px;font-size:11px;border-radius:5px}

/* AI Section */
.ai-section{background:linear-gradient(180deg,rgba(30,27,75,.35) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:14px}
.ai-row{margin-bottom:10px}
.ai-row:last-child{margin-bottom:0}
.ai-row label{color:#a5b4fc;margin-bottom:5px}
.ai-input-row{display:flex;gap:6px}
.ai-input-row input{flex:1;padding:5px 8px;font-size:11px;background:#000;border-color:#334155;border-radius:7px}
.ai-input-row input:focus{border-color:#6366f1}
.btn-ai{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:700;color:#fff;transition:.15s;white-space:nowrap}
.btn-ai.indigo{background:#4f46e5}.btn-ai.indigo:hover{background:#4338ca}
.btn-ai.fuchsia{background:#a21caf}.btn-ai.fuchsia:hover{background:#86198f}

/* Add Elements */
.upload-btn{width:100%;background:linear-gradient(90deg,rgba(5,150,105,.15),rgba(15,118,110,.15));border:1px solid rgba(16,185,129,.25);color:var(--green);padding:7px;border-radius:8px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;transition:.15s}
.upload-btn:hover{background:linear-gradient(90deg,rgba(5,150,105,.25),rgba(15,118,110,.25))}
.elem-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.elem-btn{background:#111;border:1px solid var(--border);padding:7px;border-radius:8px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.elem-btn:hover{background:#1e293b;border-color:#334155}

/* Themes */
.theme-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.theme-row::-webkit-scrollbar{height:3px}
.theme-row::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.theme-chip{flex-shrink:0;display:flex;align-items:center;gap:4px;background:#111;border:1px solid var(--border);padding:5px 8px;border-radius:8px;font-size:9px;font-weight:700;color:#cbd5e1;transition:.15s;cursor:pointer}
.theme-chip:hover{border-color:#475569}
.theme-dot{width:10px;height:10px;border-radius:50%}

/* Properties Panel */
.props-panel{padding:14px;flex:1}
.props-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.props-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent)}
.prop-actions{display:flex;gap:4px}
.icon-btn{width:24px;height:24px;border-radius:5px;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:9px;color:#94a3b8;transition:.15s}
.icon-btn:hover{background:#334155;color:#fff}
.icon-btn.del{background:rgba(127,29,29,.4);color:#f87171}
.icon-btn.del:hover{background:rgba(127,29,29,.7)}
.field-group{display:grid;gap:8px;margin-bottom:10px}
.field-group.cols2{grid-template-columns:1fr 1fr}
.field-group.cols3{grid-template-columns:1fr 1fr 1fr}
.field-group .field input,.field-group .field select,.field-group .field textarea{width:100%;padding:5px 8px;font-size:11px}
.field-group .field textarea{resize:none}
.color-pick{display:flex;align-items:center;background:#000;border:1px solid var(--border);border-radius:5px;padding:4px}
.color-pick input[type=color]{width:100%;height:20px;border:none;background:transparent;cursor:pointer;padding:0}
.range-wrap{display:flex;flex-direction:column;gap:4px}
.range-label{display:flex;justify-content:space-between;align-items:center}
.range-label span:last-child{font-size:9px;color:#cbd5e1}
input[type=range]{width:100%;accent-color:var(--accent)}
.card-box{background:#111;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.card-box .sub-title{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#94a3b8;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:8px}
.align-btns{display:flex;background:#000;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.align-btn{flex:1;padding:5px;font-size:11px;color:var(--muted);transition:.15s;border-right:1px solid var(--border)}
.align-btn:last-child{border-right:none}
.align-btn.active{background:#334155;color:#fff}
.align-btn:hover:not(.active){background:#1e293b}
.ai-text-box{background:rgba(30,27,75,.3);border:1px solid rgba(99,102,241,.3);border-radius:10px;padding:10px;margin-bottom:10px}
.ai-text-title{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#a5b4fc;margin-bottom:8px}
.ai-rewrite-btns{display:flex;gap:6px;margin-bottom:6px}
.ai-rw-btn{flex:1;background:#4f46e5;color:#fff;font-size:10px;font-weight:700;padding:5px;border-radius:5px;transition:.15s}
.ai-rw-btn:hover{background:#4338ca}
.ai-rw-btn.secondary{background:#1e293b;border:1px solid #334155;color:#cbd5e1}
.ai-rw-btn.secondary:hover{background:#334155}
.no-select-msg{font-size:10px;color:var(--muted);line-height:1.6;margin-top:8px}
.no-select-msg strong{color:#94a3b8}
.bg-field{display:flex;align-items:center;gap:8px;background:#111;border:1px solid var(--border);border-radius:7px;padding:7px}
.bg-field input[type=color]{width:32px;height:32px;border:none;background:transparent;cursor:pointer;border-radius:5px}
.bg-field .hex-val{font-size:11px;font-family:monospace;text-transform:uppercase;color:#cbd5e1}

/* Canvas */
main{flex:1;background:#121212;position:relative;overflow:auto;display:flex;align-items:center;justify-content:center;padding:40px}
.dot-grid{position:absolute;inset:0;opacity:.08;pointer-events:none;background-image:radial-gradient(circle at 2px 2px,white 1px,transparent 0);background-size:24px 24px}
.canvas-wrap{position:relative;flex-shrink:0;box-shadow:0 25px 60px rgba(0,0,0,.8);transition:transform .1s}
.canvas-wrap svg{display:block;overflow:visible;user-select:none;touch-action:none}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;background:#0f172a;border:1px solid #334155;color:#fff;padding:10px 18px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.6);display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;z-index:100;opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast i{color:var(--green);font-size:13px}

/* AI Loading overlay */
#ai-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
#ai-overlay.show{display:flex}
.ai-loader{background:#0f172a;border:1px solid rgba(99,102,241,.4);padding:24px 32px;border-radius:16px;display:flex;flex-direction:column;align-items:center;gap:10px}
.ai-loader i{font-size:28px;color:#818cf8;animation:pulse 1.2s ease-in-out infinite}
.ai-loader span{font-size:12px;font-weight:700;background:linear-gradient(90deg,#818cf8,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-pen-nib"></i></div>
      <span class="logo-name">MEGA STUDIO + AI</span>
    </div>
    <div class="header-right">
      <div class="zoom-ctrl">
        <button class="zoom-btn" onclick="zoom(-10)"><i class="fa-solid fa-minus"></i></button>
        <span class="zoom-val" id="zoom-val">100%</span>
        <button class="zoom-btn" onclick="zoom(+10)"><i class="fa-solid fa-plus"></i></button>
      </div>
      <button class="btn-export" onclick="exportPNG()"><i class="fa-solid fa-download"></i> Export PNG</button>
    </div>
  </header>

  <div class="workspace">
    <!-- LEFT SIDEBAR -->
    <aside>

      <!-- FORMAT -->
      <div class="section">
        <div class="sec-title">Canvas Format</div>
        <div class="fmt-grid" id="fmt-grid"></div>
        <div class="custom-dims" id="custom-dims" style="display:none">
          <div class="field"><label>Width (px)</label><input type="number" id="cust-w" value="1000" oninput="setCustomDim()"/></div>
          <div class="field"><label>Height (px)</label><input type="number" id="cust-h" value="1000" oninput="setCustomDim()"/></div>
        </div>
      </div>

      <!-- AI -->
      <div class="ai-section">
        <div class="sec-title ai"><i class="fa-solid fa-wand-magic-sparkles"></i> 🤖 AI Magic Studio</div>
        <div class="ai-row">
          <label style="color:#a5b4fc">Generate Brand Theme</label>
          <div class="ai-input-row">
            <input type="text" id="ai-theme-inp" placeholder="e.g. Cyberpunk Neon"/>
            <button class="btn-ai indigo" onclick="aiTheme()">Apply</button>
          </div>
        </div>
        <div class="ai-row">
          <label style="color:#a5b4fc">Generate Text Elements</label>
          <div class="ai-input-row">
            <input type="text" id="ai-content-inp" placeholder="e.g. Tips for good sleep"/>
            <button class="btn-ai fuchsia" onclick="aiContent()">Generate</button>
          </div>
        </div>
      </div>

      <!-- ADD ELEMENTS -->
      <div class="section">
        <div class="sec-title">Add Elements</div>
        <input type="file" id="file-inp" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="uploadImage(this)"/>
        <button class="upload-btn" onclick="document.getElementById('file-inp').click()"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Image / PNG</button>
        <div class="elem-grid">
          <button class="elem-btn" onclick="addLayer('text')"><i class="fa-solid fa-font"></i> Text</button>
          <button class="elem-btn" onclick="addLayer('rect')"><i class="fa-regular fa-square"></i> Shape</button>
          <button class="elem-btn" onclick="addLayer('circle')"><i class="fa-regular fa-circle"></i> Circle</button>
          <button class="elem-btn" onclick="addLayer('line')"><i class="fa-solid fa-minus"></i> Line</button>
        </div>
      </div>

      <!-- THEMES -->
      <div class="section">
        <div class="sec-title">1-Click Themes</div>
        <div class="theme-row" id="theme-row"></div>
      </div>

      <!-- PROPERTIES -->
      <div class="props-panel" id="props-panel">
        <div id="props-selected" style="display:none">
          <div class="props-header">
            <span class="props-title" id="props-title">Edit Layer</span>
            <div class="prop-actions">
              <button class="icon-btn" title="Bring Forward" onclick="moveLayer('up')"><i class="fa-solid fa-arrow-up"></i></button>
              <button class="icon-btn" title="Send Backward" onclick="moveLayer('down')"><i class="fa-solid fa-arrow-down"></i></button>
              <button class="icon-btn del" title="Delete" onclick="deleteLayer()"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
          <div id="props-body"></div>
        </div>

        <div id="props-empty">
          <div class="sec-title">Global Canvas</div>
          <label>Background Color</label>
          <div class="bg-field">
            <input type="color" id="bg-color" oninput="state.bg=this.value;renderBg();document.getElementById('bg-hex').textContent=this.value.toUpperCase()"/>
            <span class="hex-val" id="bg-hex">#0B0F19</span>
          </div>
          <p class="no-select-msg" style="margin-top:10px">Click any element on the canvas to edit its properties, or use the <strong>AI Magic Studio</strong> above to let Gemini do the heavy lifting!</p>
        </div>
      </div>

    </aside>

    <!-- CANVAS -->
    <main id="canvas-main">
      <div class="dot-grid"></div>
      <div class="canvas-wrap" id="canvas-wrap">
        <svg id="main-svg" xmlns="http://www.w3.org/2000/svg"
          onpointerdown="svgPointerDown(event)"
          onpointermove="svgPointerMove(event)"
          onpointerup="svgPointerUp(event)"
          onpointerleave="svgPointerUp(event)"
          onclick="svgClick(event)">
          <rect id="bg-rect"/>
        </svg>
      </div>
    </main>
  </div>
</div>

<!-- AI OVERLAY -->
<div id="ai-overlay">
  <div class="ai-loader">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    <span>Gemini AI is working...</span>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><i class="fa-solid fa-circle-check"></i><span id="toast-msg"></span></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const FORMATS = [
  { id:'instagram-portrait', name:'Instagram Portrait', w:1080, h:1350, icon:'fa-brands fa-instagram' },
  { id:'youtube-thumbnail', name:'YouTube Thumbnail', w:1280, h:720, icon:'fa-brands fa-youtube' },
  { id:'business-card', name:'Business Card', w:1050, h:600, icon:'fa-solid fa-address-card' },
  { id:'logo-design', name:'Minimalist Logo', w:800, h:800, icon:'fa-solid fa-compass-drafting' },
  { id:'a4-document', name:'A4 Document', w:827, h:1169, icon:'fa-solid fa-file-lines' },
  { id:'flyer-poster', name:'Flyer / Poster', w:1080, h:1528, icon:'fa-solid fa-scroll' },
  { id:'custom-dimension', name:'Custom Dimension', w:1000, h:1000, icon:'fa-solid fa-sliders' }
];

const TEMPLATES = {
  'instagram-portrait': {
    bg:'#0B0F19', layers:[
      { id:'glow1',type:'circle',x:200,y:200,r:350,fill:'#10B981',opacity:.1,blur:true },
      { id:'glow2',type:'circle',x:800,y:1000,r:350,fill:'#3B82F6',opacity:.08,blur:true },
      { id:'badge-bg',type:'rect',x:100,y:180,w:180,h:48,rx:8,fill:'#10B981',opacity:.15,stroke:'#10B981',strokeWidth:1.5,hasShadow:true,shadowColor:'#10B981',shadowBlur:20 },
      { id:'badge-txt',type:'text',x:190,y:212,text:'PRO TIPS',fontSize:18,fontWeight:'800',fill:'#10B981',fontFamily:'Inter',textAnchor:'middle' },
      { id:'title1',type:'text',x:100,y:360,text:'3 Tools You Are',fontSize:72,fontWeight:'900',fill:'#FFFFFF',fontFamily:'League Spartan',hasShadow:true,shadowColor:'#000000',shadowBlur:15 },
      { id:'title2',type:'text',x:100,y:460,text:'USING WRONG.',fontSize:72,fontWeight:'900',fill:'#10B981',fontFamily:'League Spartan',hasShadow:true,shadowColor:'#10B981',shadowBlur:30 },
      { id:'desc',type:'text',x:100,y:600,text:'Stop wasting hours doing everything manually. Use these automated agents instead.',fontSize:24,fontWeight:'400',fill:'#9CA3AF',fontFamily:'Inter' },
      { id:'footer-line',type:'line',x1:100,y1:1150,x2:980,y2:1150,stroke:'#1F2937',strokeWidth:2 },
      { id:'handle',type:'text',x:100,y:1210,text:'@aarav_tech',fontSize:22,fontWeight:'bold',fill:'#9CA3AF',fontFamily:'Plus Jakarta Sans' },
      { id:'save',type:'text',x:980,y:1210,text:'SAVE POST ↗',fontSize:20,fontWeight:'900',fill:'#10B981',fontFamily:'Inter',textAnchor:'end' }
    ]
  },
  'youtube-thumbnail': {
    bg:'#070A13', layers:[
      { id:'glow',type:'circle',x:1100,y:360,r:400,fill:'#EF4444',opacity:.15,blur:true },
      { id:'accent-box',type:'rect',x:80,y:180,w:600,h:360,rx:20,fill:'#131B2E',stroke:'#3B82F6',strokeWidth:4,opacity:1,hasShadow:true,shadowColor:'#000000',shadowBlur:20 },
      { id:'badge',type:'rect',x:120,y:220,w:160,h:42,rx:6,fill:'#EF4444',opacity:1 },
      { id:'badge-txt',type:'text',x:200,y:248,text:'FREE COURSE',fontSize:15,fontWeight:'900',fill:'#FFFFFF',fontFamily:'Inter',textAnchor:'middle' },
      { id:'main-title',type:'text',x:120,y:360,text:'REACT JS IN',fontSize:58,fontWeight:'900',fill:'#FFFFFF',fontFamily:'Archivo Black' },
      { id:'sub-title',type:'text',x:120,y:450,text:'10 MINUTES!',fontSize:58,fontWeight:'900',fill:'#3B82F6',fontFamily:'Archivo Black',hasShadow:true,shadowColor:'#3B82F6',shadowBlur:25 },
      { id:'caption',type:'text',x:120,y:500,text:'No experience required. Learn clean architecture.',fontSize:18,fontWeight:'400',fill:'#9CA3AF',fontFamily:'Inter' },
      { id:'mockup-rect',type:'rect',x:740,y:180,w:460,h:360,rx:16,fill:'#1E293B',stroke:'#334155',strokeWidth:2,opacity:1,hasShadow:true,shadowColor:'#000000',shadowBlur:30 },
      { id:'mockup-text',type:'text',x:970,y:370,text:'[ DRAG SCREENSHOT HERE ]',fontSize:20,fontWeight:'bold',fill:'#64748B',fontFamily:'Space Grotesk',textAnchor:'middle' }
    ]
  }
};

const THEMES = [
  { name:'Dark Neon', bg:'#09090B', text:'#FFFFFF', card:'#18181B', accent:'#00F5A0' },
  { name:'Royal Gold', bg:'#172A45', text:'#F8FAFC', card:'#0B132B', accent:'#F5A623' },
  { name:'Vaporwave', bg:'#10002B', text:'#E0AAFF', card:'#240046', accent:'#FF006E' },
  { name:'Latte', bg:'#F9F6F0', text:'#2D3748', card:'#FFFFFF', accent:'#D69E2E' }
];

const FONTS = ['League Spartan','Archivo Black','Anton','Playfair Display','Space Grotesk','Inter','Montserrat','Plus Jakarta Sans'];

// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  format: FORMATS[0],
  customW: 1000, customH: 1000,
  bg: '#0B0F19',
  layers: [],
  selectedId: null,
  dragging: false,
  dragOffset: {x:0,y:0},
  zoom: 100
};

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  renderFormatGrid();
  renderThemes();
  loadTemplate('instagram-portrait');
  updateCanvasSize();
}

function renderFormatGrid() {
  document.getElementById('fmt-grid').innerHTML = FORMATS.map(f => `
    <button class="fmt-btn ${f.id===state.format.id?'active':''}" onclick="setFormat('${f.id}')">
      <div class="fmt-name"><i class="${f.icon}"></i>${f.name}</div>
      <div class="fmt-dim">${f.w} × ${f.h}</div>
    </button>`).join('');
}

function renderThemes() {
  document.getElementById('theme-row').innerHTML = THEMES.map((t,i) => `
    <div class="theme-chip" onclick="applyTheme(${i})">
      <span class="theme-dot" style="background:${t.bg}"></span>
      <span class="theme-dot" style="background:${t.accent}"></span>
      <span>${t.name}</span>
    </div>`).join('');
}

function setFormat(id) {
  state.format = FORMATS.find(f=>f.id===id);
  state.selectedId = null;
  renderFormatGrid();
  document.getElementById('custom-dims').style.display = id==='custom-dimension'?'flex':'none';
  if (id!=='custom-dimension' && TEMPLATES[id]) {
    loadTemplate(id);
  } else {
    state.layers = [];
    state.bg = '#FFFFFF';
    renderAll();
  }
  updateCanvasSize();
}

function setCustomDim() {
  state.customW = parseInt(document.getElementById('cust-w').value)||100;
  state.customH = parseInt(document.getElementById('cust-h').value)||100;
  updateCanvasSize();
  renderAll();
}

function loadTemplate(id) {
  const t = TEMPLATES[id];
  state.bg = t.bg;
  state.layers = t.layers.map(l=>({...l}));
  renderAll();
}

function cW() { return state.format.id==='custom-dimension'?state.customW:state.format.w; }
function cH() { return state.format.id==='custom-dimension'?state.customH:state.format.h; }

function updateCanvasSize() {
  const svg = document.getElementById('main-svg');
  const wrap = document.getElementById('canvas-wrap');
  const w = cW(), h = cH();
  svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  wrap.style.width = w+'px';
  wrap.style.height = h+'px';
  document.getElementById('bg-rect').setAttribute('width',w);
  document.getElementById('bg-rect').setAttribute('height',h);
  renderBg();
  applyZoom();
}

function applyZoom() {
  document.getElementById('canvas-wrap').style.transform = `scale(${state.zoom/100})`;
  document.getElementById('zoom-val').textContent = state.zoom+'%';
}

function zoom(d) {
  state.zoom = Math.min(200,Math.max(20,state.zoom+d));
  applyZoom();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderBg() {
  document.getElementById('bg-rect').setAttribute('fill', state.bg);
  document.getElementById('bg-color').value = state.bg;
  document.getElementById('bg-hex').textContent = state.bg.toUpperCase();
}

function renderAll() {
  renderBg();
  renderLayers();
  renderProps();
}

function filterStr(layer) {
  const shadow = layer.hasShadow ? `drop-shadow(0px 8px ${layer.shadowBlur||15}px ${layer.shadowColor||'rgba(0,0,0,0.6)'})` : '';
  const img = (layer.filter && layer.filter!=='none') ? layer.filter : '';
  return [shadow, img].filter(Boolean).join(' ') || 'none';
}

function makeSVGEl(tag, attrs, style={}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) if(v!==undefined) el.setAttribute(k,v);
  for (const [k,v] of Object.entries(style)) el.style[k]=v;
  return el;
}

function renderLayers() {
  const svg = document.getElementById('main-svg');
  // Remove old layer groups
  svg.querySelectorAll('.layer-g').forEach(g=>g.remove());

  for (const layer of state.layers) {
    const g = makeSVGEl('g', {'data-id':layer.id, class:'layer-g'}, {cursor:'grab'});
    const sel = layer.id === state.selectedId;
    const op = layer.opacity !== undefined ? layer.opacity : 1;
    const filt = filterStr(layer);

    if (layer.type === 'image') {
      const clipId = `clip_${layer.id}`;
      const defs = makeSVGEl('defs',{});
      const cp = makeSVGEl('clipPath',{id:clipId});
      cp.appendChild(makeSVGEl('rect',{width:layer.w,height:layer.h,rx:layer.rx||0}));
      defs.appendChild(cp);
      g.appendChild(defs);
      g.setAttribute('transform',`translate(${layer.x},${layer.y})`);
      const img = makeSVGEl('image',{href:layer.src,width:layer.w,height:layer.h,'clip-path':`url(#${clipId})`,'preserveAspectRatio':'xMidYMid slice'});
      img.style.opacity = op;
      img.style.filter = filt;
      g.appendChild(img);
      if (sel) g.appendChild(makeSVGEl('rect',{width:layer.w,height:layer.h,rx:layer.rx||0,fill:'none',stroke:'#3b82f6','stroke-width':4,'stroke-dasharray':'8 4'}));
    } else if (layer.type === 'rect') {
      g.setAttribute('transform',`translate(${layer.x},${layer.y})`);
      g.style.opacity = op;
      g.style.filter = filt;
      g.appendChild(makeSVGEl('rect',{width:layer.w,height:layer.h,rx:layer.rx||0,fill:layer.fill,stroke:layer.stroke||'none','stroke-width':layer.strokeWidth||0}));
      if (sel) g.appendChild(makeSVGEl('rect',{width:layer.w,height:layer.h,rx:layer.rx||0,fill:'none',stroke:'#3b82f6','stroke-width':4,'stroke-dasharray':'8 4'}));
    } else if (layer.type === 'circle') {
      g.setAttribute('transform',`translate(${layer.x},${layer.y})`);
      g.style.opacity = op;
      const cf = layer.blur ? `blur(80px) ${layer.hasShadow?`drop-shadow(0 8px ${layer.shadowBlur||15}px ${layer.shadowColor||'#000'})`:''}` : filt;
      g.style.filter = cf;
      g.appendChild(makeSVGEl('circle',{cx:0,cy:0,r:layer.r,fill:layer.fill,stroke:layer.stroke||'none','stroke-width':layer.strokeWidth||0}));
      if (sel) g.appendChild(makeSVGEl('circle',{cx:0,cy:0,r:layer.r+4,fill:'none',stroke:'#3b82f6','stroke-width':4,'stroke-dasharray':'8 4'}));
    } else if (layer.type === 'line') {
      g.style.opacity = op;
      g.style.filter = filt;
      // fat invisible hit target
      g.appendChild(makeSVGEl('line',{x1:layer.x1,y1:layer.y1,x2:layer.x2,y2:layer.y2,stroke:'transparent','stroke-width':20}));
      g.appendChild(makeSVGEl('line',{x1:layer.x1,y1:layer.y1,x2:layer.x2,y2:layer.y2,stroke:layer.stroke,'stroke-width':layer.strokeWidth}));
      if (sel) g.appendChild(makeSVGEl('line',{x1:layer.x1,y1:layer.y1,x2:layer.x2,y2:layer.y2,stroke:'#3b82f6','stroke-width':(layer.strokeWidth||2)+4,'stroke-dasharray':'8 4',opacity:.5}));
    } else if (layer.type === 'text') {
      g.setAttribute('transform',`translate(${layer.x},${layer.y})`);
      g.style.opacity = op;
      g.style.filter = filt;
      const txt = makeSVGEl('text',{
        x:0,y:0,fill:layer.fill,'font-size':layer.fontSize,
        'font-family':layer.fontFamily,'font-weight':layer.fontWeight||'normal',
        'text-anchor':layer.textAnchor||'start',
        'letter-spacing':layer.letterSpacing||0,
        stroke:layer.stroke&&layer.stroke!=='none'?layer.stroke:null,
        'stroke-width':layer.strokeWidth||0,'stroke-linejoin':'round'
      },{userSelect:'none',dominantBaseline:'hanging'});
      const lines = (layer.text||'').split('\n');
      lines.forEach((line,i)=>{
        const ts = makeSVGEl('tspan',{x:0, dy: i===0?0:layer.fontSize*1.2});
        ts.textContent = line;
        txt.appendChild(ts);
      });
      g.appendChild(txt);
      if (sel) {
        const len = (layer.text||'').length;
        const lc = lines.length;
        const anchorOff = layer.textAnchor==='middle'?-(len*layer.fontSize*.3):layer.textAnchor==='end'?-(len*layer.fontSize*.6):-5;
        g.appendChild(makeSVGEl('rect',{
          x:anchorOff,y:-5,width:(len*layer.fontSize*.6)+10,height:(lc*layer.fontSize*1.2)+10,
          fill:'none',stroke:'#3b82f6','stroke-width':3,'stroke-dasharray':'6 4',opacity:.8
        }));
      }
    }

    g.addEventListener('pointerdown', e => layerPointerDown(e, layer.id));
    svg.appendChild(g);
  }
}

// ─── DRAG ────────────────────────────────────────────────────────────────────
function svgCoords(e) {
  const svg = document.getElementById('main-svg');
  const CTM = svg.getScreenCTM();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x:(cx-CTM.e)/CTM.a, y:(cy-CTM.f)/CTM.d };
}

function layerPointerDown(e, id) {
  e.stopPropagation();
  state.selectedId = id;
  state.dragging = true;
  const c = svgCoords(e);
  const l = state.layers.find(x=>x.id===id);
  if (l.type==='line') state.dragOffset = {x:c.x-l.x1, y:c.y-l.y1};
  else state.dragOffset = {x:c.x-(l.x||0), y:c.y-(l.y||0)};
  renderLayers();
  renderProps();
}

function svgPointerDown(e) { /* handled per layer */ }

function svgPointerMove(e) {
  if (!state.dragging || !state.selectedId) return;
  e.preventDefault();
  const c = svgCoords(e);
  const nx = c.x - state.dragOffset.x;
  const ny = c.y - state.dragOffset.y;
  const l = state.layers.find(x=>x.id===state.selectedId);
  if (!l) return;
  if (l.type==='line') {
    const dx=nx-l.x1, dy=ny-l.y1;
    l.x1=nx; l.y1=ny; l.x2+=dx; l.y2+=dy;
  } else { l.x=nx; l.y=ny; }
  renderLayers();
  syncPropsPosition();
}

function svgPointerUp() { state.dragging=false; }

function svgClick(e) {
  if (e.target.id==='main-svg'||e.target.id==='bg-rect') {
    state.selectedId=null;
    renderLayers();
    renderProps();
  }
}

// ─── PROPS PANEL ─────────────────────────────────────────────────────────────
function renderProps() {
  const sel = document.getElementById('props-selected');
  const empty = document.getElementById('props-empty');
  const l = state.layers.find(x=>x.id===state.selectedId);

  if (!l) { sel.style.display='none'; empty.style.display='block'; return; }
  sel.style.display='block'; empty.style.display='none';
  document.getElementById('props-title').textContent = 'Edit '+l.type;
  document.getElementById('props-body').innerHTML = buildPropsHTML(l);
}

function inp(label, type, val, onchange, extra='') {
  return `<div class="field"><label>${label}</label><input type="${type}" value="${esc(val)}" oninput="${onchange}" ${extra}/></div>`;
}

function esc(v) { return String(v??'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function buildPropsHTML(l) {
  let h = '';

  // AI text rewrites
  if (l.type==='text') h += `
    <div class="ai-text-box">
      <div class="ai-text-title">✨ Contextual AI Edits</div>
      <div class="ai-rewrite-btns">
        <button class="ai-rw-btn" onclick="aiRewrite('more catchy and engaging for social media')">Make Catchy</button>
        <button class="ai-rw-btn" onclick="aiRewrite('shorter and more punchy')">Make Shorter</button>
      </div>
      <button class="ai-rw-btn secondary" style="width:100%" onclick="aiRewrite('with corrected grammar and spelling only')">Fix Grammar</button>
    </div>`;

  // Position
  const xKey = l.type==='line'?'x1':'x';
  const yKey = l.type==='line'?'y1':'y';
  h += `<div class="field-group cols2">
    <div class="field"><label>X Position</label><input type="number" value="${Math.round(l[xKey]||0)}" oninput="upd('${xKey}',+this.value)"/></div>
    <div class="field"><label>Y Position</label><input type="number" value="${Math.round(l[yKey]||0)}" oninput="upd('${yKey}',+this.value)"/></div>
  </div>`;

  // Opacity + shadow
  h += `<div class="card-box">
    <div class="range-wrap">
      <div class="range-label"><label style="margin:0">Opacity</label><span>${Math.round((l.opacity??1)*100)}%</span></div>
      <input type="range" min=".05" max="1" step=".05" value="${l.opacity??1}" oninput="upd('opacity',+this.value);this.previousElementSibling.querySelector('span').textContent=Math.round(this.value*100)+'%'"/>
    </div>
    <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <input type="checkbox" id="chk-shadow" ${l.hasShadow?'checked':''} onchange="upd('hasShadow',this.checked);renderProps()" style="accent-color:var(--accent)"/>
        <label for="chk-shadow" style="margin:0;color:#cbd5e1;font-size:10px;font-weight:700;cursor:pointer">Enable Drop Shadow / Glow</label>
      </div>
      ${l.hasShadow?`<div class="field-group cols2" style="background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;padding:8px">
        <div class="field"><label>Shadow Color</label><div class="color-pick"><input type="color" value="${l.shadowColor||'#000000'}" oninput="upd('shadowColor',this.value)"/></div></div>
        <div class="field"><label>Blur/Spread</label><input type="range" min="0" max="100" value="${l.shadowBlur||15}" oninput="upd('shadowBlur',+this.value)"/></div>
      </div>`:''}
    </div>
  </div>`;

  // Type-specific
  if (l.type==='image') h += `
    <div class="field-group cols2">
      <div class="field"><label>Width</label><input type="number" value="${Math.round(l.w)}" oninput="upd('w',+this.value)"/></div>
      <div class="field"><label>Height</label><input type="number" value="${Math.round(l.h)}" oninput="upd('h',+this.value)"/></div>
    </div>
    <div class="field"><label>Corner Rounding</label><input type="range" min="0" max="${Math.floor(Math.min(l.w,l.h)/2)}" value="${l.rx||0}" oninput="upd('rx',+this.value)"/></div>
    <div class="field"><label>Image Filter</label>
      <select oninput="upd('filter',this.value)" style="width:100%;padding:5px 8px;font-size:11px">
        ${['none','grayscale(100%)','sepia(80%)','contrast(150%) saturate(150%)','invert(100%)','blur(4px)','hue-rotate(90deg)'].map(v=>`<option value="${v}" ${l.filter===v?'selected':''}>${{none:'Normal',
          'grayscale(100%)':'B&W','sepia(80%)':'Vintage','contrast(150%) saturate(150%)':'Vibrant','invert(100%)':'Invert','blur(4px)':'Blur','hue-rotate(90deg)':'Hue Rotate'}[v]||v}</option>`).join('')}
      </select>
    </div>`;

  if (l.type==='text') {
    const fw = ['normal','bold','700','800','900'];
    h += `
    <div class="field"><label>Text Content</label><textarea rows="3" oninput="upd('text',this.value)" style="width:100%;padding:6px 8px;font-size:11px;resize:none">${esc(l.text)}</textarea></div>
    <div class="field-group cols2">
      <div class="field"><label>Text Color</label><div class="color-pick"><input type="color" value="${l.fill||'#ffffff'}" oninput="upd('fill',this.value)"/></div></div>
      <div class="field"><label>Font Size</label><input type="number" value="${l.fontSize}" oninput="upd('fontSize',+this.value)"/></div>
    </div>
    <div class="field-group cols2">
      <div class="field"><label>Font Family</label>
        <select oninput="upd('fontFamily',this.value)" style="width:100%;padding:4px 6px;font-size:10px">${FONTS.map(f=>`<option value="${f}" ${l.fontFamily===f?'selected':''}>${f}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Font Weight</label>
        <select oninput="upd('fontWeight',this.value)" style="width:100%;padding:4px 6px;font-size:10px">${fw.map(f=>`<option value="${f}" ${l.fontWeight===f?'selected':''}>${f}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field"><label>Alignment</label>
      <div class="align-btns">
        <button class="align-btn ${l.textAnchor==='start'?'active':''}" onclick="upd('textAnchor','start');renderProps()"><i class="fa-solid fa-align-left"></i></button>
        <button class="align-btn ${l.textAnchor==='middle'?'active':''}" onclick="upd('textAnchor','middle');renderProps()"><i class="fa-solid fa-align-center"></i></button>
        <button class="align-btn ${l.textAnchor==='end'?'active':''}" onclick="upd('textAnchor','end');renderProps()"><i class="fa-solid fa-align-right"></i></button>
      </div>
    </div>
    <div class="card-box">
      <div class="sub-title">Text Outline (Stroke)</div>
      <div class="field-group cols2">
        <div class="field"><label>Outline Color</label><div class="color-pick"><input type="color" value="${l.stroke&&l.stroke!=='none'?l.stroke:'#000000'}" oninput="upd('stroke',this.value)"/></div></div>
        <div class="field"><label>Thickness</label><input type="number" min="0" max="20" value="${l.strokeWidth||0}" oninput="upd('strokeWidth',+this.value)"/></div>
      </div>
    </div>
    <div class="field">
      <div class="range-label"><label style="margin:0">Letter Spacing</label><span style="font-size:9px;color:#cbd5e1">${l.letterSpacing||0}px</span></div>
      <input type="range" min="-10" max="50" value="${l.letterSpacing||0}" oninput="upd('letterSpacing',+this.value);this.previousElementSibling.querySelector('span').textContent=this.value+'px'"/>
    </div>`;
  }

  if (l.type==='rect'||l.type==='circle') {
    h += `<div class="field-group cols2">
      <div class="field"><label>Fill Color</label><div class="color-pick"><input type="color" value="${l.fill&&l.fill!=='none'?l.fill:'#000000'}" oninput="upd('fill',this.value)"/></div></div>
      <div class="field"><label>Stroke Color</label><div class="color-pick"><input type="color" value="${l.stroke&&l.stroke!=='none'?l.stroke:'#000000'}" oninput="upd('stroke',this.value)"/></div></div>
    </div>`;
    if (l.type==='rect') h += `<div class="field-group cols3">
      <div class="field"><label>Width</label><input type="number" value="${l.w}" oninput="upd('w',+this.value)"/></div>
      <div class="field"><label>Height</label><input type="number" value="${l.h}" oninput="upd('h',+this.value)"/></div>
      <div class="field"><label>Round (rx)</label><input type="number" value="${l.rx||0}" oninput="upd('rx',+this.value)"/></div>
    </div>`;
    if (l.type==='circle') h += `<div class="field"><label>Radius</label><input type="number" value="${l.r}" oninput="upd('r',+this.value)"/></div>`;
  }

  if (l.type==='line') h += `<div class="field-group cols2">
    <div class="field"><label>Stroke Color</label><div class="color-pick"><input type="color" value="${l.stroke||'#ffffff'}" oninput="upd('stroke',this.value)"/></div></div>
    <div class="field"><label>Stroke Width</label><input type="number" value="${l.strokeWidth||2}" oninput="upd('strokeWidth',+this.value)"/></div>
  </div>`;

  return h;
}

function syncPropsPosition() {
  // lightweight live position update during drag (skip full re-render)
  const l = state.layers.find(x=>x.id===state.selectedId);
  if (!l) return;
  const xKey = l.type==='line'?'x1':'x';
  const yKey = l.type==='line'?'y1':'y';
  // find inputs by position in the form — they're always the first two numbers
  const inputs = document.querySelectorAll('#props-body input[type=number]');
  if (inputs[0]) inputs[0].value = Math.round(l[xKey]||0);
  if (inputs[1]) inputs[1].value = Math.round(l[yKey]||0);
}

function upd(key, val) {
  if (!state.selectedId) return;
  const l = state.layers.find(x=>x.id===state.selectedId);
  if (!l) return;
  l[key] = val;
  renderLayers();
}

// ─── LAYER OPS ───────────────────────────────────────────────────────────────
function genId() { return `layer_${Date.now()}_${Math.random()*1000|0}`; }

function addLayer(type) {
  const w=cW(), h=cH();
  const base = { id:genId(), type, x:w/2, y:h/2, opacity:1, hasShadow:false, shadowColor:'#000000', shadowBlur:15, filter:'none' };
  let l;
  if (type==='text') l={...base,text:'Double click to edit',fontSize:48,fontWeight:'bold',fill:'#FFFFFF',fontFamily:'Inter',textAnchor:'middle',letterSpacing:0,stroke:'none',strokeWidth:0};
  else if (type==='rect') l={...base,x:w/2-100,y:h/2-100,w:200,h:200,rx:0,fill:'#3B82F6',stroke:'none',strokeWidth:0};
  else if (type==='circle') l={...base,r:100,fill:'#10B981',stroke:'none',strokeWidth:0};
  else if (type==='line') l={...base,x1:w/2-150,y1:h/2,x2:w/2+150,y2:h/2,stroke:'#FFFFFF',strokeWidth:4,x:w/2-150,y:h/2};
  state.layers.push(l);
  state.selectedId = l.id;
  renderLayers();
  renderProps();
}

function deleteLayer() {
  if (!state.selectedId) return;
  state.layers = state.layers.filter(l=>l.id!==state.selectedId);
  state.selectedId = null;
  renderLayers();
  renderProps();
}

function moveLayer(dir) {
  if (!state.selectedId) return;
  const idx = state.layers.findIndex(l=>l.id===state.selectedId);
  if (idx<0) return;
  const arr = [...state.layers];
  if (dir==='up' && idx<arr.length-1) [arr[idx],arr[idx+1]]=[arr[idx+1],arr[idx]];
  else if (dir==='down' && idx>0) [arr[idx],arr[idx-1]]=[arr[idx-1],arr[idx]];
  state.layers = arr;
  renderLayers();
}

function uploadImage(inp) {
  const file = inp.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const w=cW(), h=cH();
      const max = Math.min(w,h)*.8;
      let iw=img.width, ih=img.height;
      if (iw>max||ih>max) { const r=Math.min(max/iw,max/ih); iw*=r; ih*=r; }
      const l = {id:genId(),type:'image',src:ev.target.result,x:(w-iw)/2,y:(h-ih)/2,w:iw,h:ih,opacity:1,rx:0,hasShadow:false,shadowColor:'#000000',shadowBlur:15,filter:'none'};
      state.layers.push(l);
      state.selectedId = l.id;
      renderLayers();
      renderProps();
      inp.value='';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── THEMES ──────────────────────────────────────────────────────────────────
function applyTheme(i) {
  const t = THEMES[i];
  _applyThemeObj(t);
}

function _applyThemeObj(t) {
  const oldBg = state.bg;
  state.bg = t.bg;
  state.layers = state.layers.map(l=>{
    const u={...l};
    if(l.type==='text') u.fill=(l.fill==='#FFFFFF'||l.fill==='#000000'||l.fill===oldBg)?t.text:t.accent;
    else if(l.type==='rect'||l.type==='circle') if(l.fill!=='none') u.fill=Math.random()>.5?t.card:t.accent;
    return u;
  });
  renderAll();
  toast(`${t.name} theme applied!`);
}

// ─── AI ──────────────────────────────────────────────────────────────────────
function showAiLoader(v) { document.getElementById('ai-overlay').className=v?'show':''; }

async function callGemini(payload) {
  const apiKey = '';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
  for (let i=0,delay=1000; i<3; i++, delay*=2) {
    try {
      const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if (!r.ok) throw new Error('API error');
      return await r.json();
    } catch(e) { if(i===2) throw e; await new Promise(r=>setTimeout(r,delay)); }
  }
}

async function aiTheme() {
  const p = document.getElementById('ai-theme-inp').value.trim();
  if (!p) return;
  showAiLoader(true);
  try {
    const res = await callGemini({
      contents:[{parts:[{text:`Act as an expert designer. Generate a gorgeous, highly contrasting color palette for a social media post about: "${p}". The text color MUST be highly visible against the background.`}]}],
      generationConfig:{responseMimeType:'application/json',responseSchema:{type:'OBJECT',properties:{name:{type:'STRING'},bg:{type:'STRING'},text:{type:'STRING'},card:{type:'STRING'},accent:{type:'STRING'}},required:['name','bg','text','card','accent']}}
    });
    const t = JSON.parse(res.candidates[0].content.parts[0].text);
    _applyThemeObj(t);
  } catch { toast('AI Theme generation failed.'); } finally { showAiLoader(false); }
}

async function aiContent() {
  const p = document.getElementById('ai-content-inp').value.trim();
  if (!p) return;
  showAiLoader(true);
  try {
    const res = await callGemini({
      contents:[{parts:[{text:`Act as a viral copywriter. Write a short, punchy social media post about: "${p}". Provide a catchy main heading and a descriptive subheading.`}]}],
      generationConfig:{responseMimeType:'application/json',responseSchema:{type:'OBJECT',properties:{heading:{type:'STRING'},subheading:{type:'STRING'}},required:['heading','subheading']}}
    });
    const c = JSON.parse(res.candidates[0].content.parts[0].text);
    const w=cW(), h=cH();
    state.layers.push(
      {id:genId(),type:'text',x:w/2,y:h/2-60,opacity:1,hasShadow:true,shadowColor:'#000000',shadowBlur:15,filter:'none',text:c.heading.toUpperCase(),fontSize:72,fontWeight:'900',fill:'#FFFFFF',fontFamily:'League Spartan',textAnchor:'middle',letterSpacing:0,stroke:'none',strokeWidth:0},
      {id:genId(),type:'text',x:w/2,y:h/2+40,opacity:1,hasShadow:false,filter:'none',text:c.subheading,fontSize:24,fontWeight:'400',fill:'#A3A3A3',fontFamily:'Inter',textAnchor:'middle',letterSpacing:0,stroke:'none',strokeWidth:0}
    );
    state.selectedId = state.layers[state.layers.length-2].id;
    renderLayers(); renderProps();
    document.getElementById('ai-content-inp').value='';
    toast('AI Generated Text added to canvas!');
  } catch { toast('AI Content generation failed.'); } finally { showAiLoader(false); }
}

async function aiRewrite(instruction) {
  const l = state.layers.find(x=>x.id===state.selectedId);
  if (!l||l.type!=='text') return;
  showAiLoader(true);
  try {
    const res = await callGemini({
      contents:[{parts:[{text:`Rewrite the following text to make it ${instruction}. Do not include quotation marks or extra conversation in your response, just the rewritten text:\n\n${l.text}`}]}]
    });
    let txt = res.candidates[0].content.parts[0].text.trim();
    if(txt.startsWith('"')&&txt.endsWith('"')) txt=txt.slice(1,-1);
    l.text=txt;
    renderLayers(); renderProps();
    toast('Text rewritten successfully!');
  } catch { toast('AI Text Rewrite failed.'); } finally { showAiLoader(false); }
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportPNG() {
  toast('Generating high-res PNG…');
  const cached = state.selectedId;
  state.selectedId = null;
  renderLayers();
  setTimeout(()=>{
    const svg = document.getElementById('main-svg');
    const str = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([str],{type:'image/svg+xml;charset=utf-8'});
    const burl = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = ()=>{
      const c = document.createElement('canvas');
      c.width=cW(); c.height=cH();
      const ctx=c.getContext('2d');
      ctx.fillStyle=state.bg;
      ctx.fillRect(0,0,c.width,c.height);
      ctx.drawImage(img,0,0,c.width,c.height);
      const a=document.createElement('a');
      a.href=c.toDataURL('image/png',1);
      a.download=`Studio-Export-${Date.now()}.png`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      state.selectedId=cached; renderLayers();
      toast('Export complete!');
    };
    img.src=burl;
  },120);
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
init();
</script>
